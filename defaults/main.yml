---
# defaults file for wordpress_ops

# Docker
mysql_container: "db"

# Backup local
backup_base_dir: "/opt/backups/wordpress"
backup_db_dir: "{{ backup_base_dir }}/database"

# Database information
db_name: "wordpress"
db_user: "wordpress"
db_password: "wordpress"
db_root_password: "rootpassword"

# AWS S3
s3_bucket: "wordpress-backups-1"
s3_region: "us-east-1"
s3_prefix: "wordpress"
s3_db_prefix: "{{ s3_prefix }}/database"
aws_access_key: ""
aws_secret_key: ""

# Timestamp format
backup_timestamp: "{{ ansible_date_time.date }}-{{ ansible_date_time.hour }}{{ ansible_date_time.minute }}{{ ansible_date_time.second }}"
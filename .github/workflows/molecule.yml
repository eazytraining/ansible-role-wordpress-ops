---
name: Molecule Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  molecule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer Molecule et dépendances
        run: |
          pip install "ansible-core>=2.17,<2.19"
          pip install molecule==26.3.0 molecule-docker==2.1.0 docker==7.1.0

      - name: Installer les collections Ansible
        run: |
          ansible-galaxy collection install -r requirements.yml

      - name: Lancer les tests Molecule
        run: |
          molecule test
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"